<!DOCTYPE html>
<html>
<head>
<title>Price Calculator</title>
</head>

<body>

<h2>Price Calculator</h2>

<label>Product Price:</label><br>
<input type="number" id="price"><br><br>

<label>Percentage:</label><br>
<input type="number" id="percent"><br><br>

<button onclick="discount()">Discount</button>
<button onclick="increase()">Increase</button>

<h3 id="result"></h3>

<script>

function discount() {
let price = document.getElementById("price").value;
let percent = document.getElementById("percent").value;

let amount = (price * percent) / 100;
let final = price - amount;

document.getElementById("result").innerHTML =
"Discount: ₹" + amount.toFixed(2) +
"<br>Final Price: ₹" + final.toFixed(2);
}

function increase() {
let price = document.getElementById("price").value;
let percent = document.getElementById("percent").value;

let amount = (price * percent) / 100;
let final = Number(price) + Number(amount);

document.getElementById("result").innerHTML =
"Increase: ₹" + amount.toFixed(2) +
"<br>New Price: ₹" + final.toFixed(2);
}

</script>

</body>
</html>
